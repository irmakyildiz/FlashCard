        const FlashCard = ({ item, isFlipped, onClick, isLarge = false }) => {
          const height = isLarge ? "h-64 md:h-80" : "h-48 md:h-56";
          return (
            <div className={`perspective-1000 w-full ${height} cursor-pointer select-none`} onClick={onClick}>
              <div className={`relative w-full h-full transition-all duration-500 preserve-3d ${isFlipped ? 'rotate-y-180' : ''}`}>
                {/* Ön Yüz */}
                <div className="absolute inset-0 bg-white border-2 border-slate-100 rounded-2xl shadow-sm flex flex-col items-center justify-center p-6 backface-hidden">
                  <span className="text-slate-400 text-[10px] font-bold uppercase mb-2">English</span>
                  <h3 className={`${isLarge ? 'text-3xl' : 'text-xl'} font-bold text-slate-800 text-center`}>{item.en}</h3>
                  <i className="fa-solid fa-rotate text-slate-200 mt-4"></i>
                </div>
                {/* Arka Yüz */}
                <div className="absolute inset-0 bg-blue-600 rounded-2xl shadow-xl flex flex-col items-center justify-center p-6 rotate-y-180 backface-hidden text-white">
                  <span className="text-blue-200 text-[10px] font-bold uppercase mb-2">Türkçe</span>
                  <h3 className={`${isLarge ? 'text-3xl' : 'text-xl'} font-bold text-center`}>{item.tr}</h3>
                </div>
              </div>
            </div>
          );
        };

        const App = () => {
          const [view, setView] = useState('cards'); // 'cards' or 'quiz'
          const [activeCat, setActiveCat] = useState("A – KİMYASALLAR");
          const [search, setSearch] = useState("");
          const [quizDeck, setQuizDeck] = useState([]);
          const [isFlipped, setIsFlipped] = useState(false);
          const [flippedStates, setFlippedStates] = useState({});

          const cats = Object.keys(VOCAB_DATA);

          const list = useMemo(() => {
            if (search) {
              return Object.values(VOCAB_DATA).flat().filter(w => 
                w.en.toLowerCase().includes(search.toLowerCase()) || 
                w.tr.toLowerCase().includes(search.toLowerCase())
              );
            }
            return VOCAB_DATA[activeCat] || [];
          }, [search, activeCat]);

          const startQuiz = () => {
            const all = Object.values(VOCAB_DATA).flat().sort(() => Math.random() - 0.5);
            setQuizDeck(all);
            setView('quiz');
            setIsFlipped(false);
          };

          const handleQuizNext = (known) => {
            setIsFlipped(false);
            setTimeout(() => {
              setQuizDeck(prev => {
                const current = prev[0];
                const rest = prev.slice(1);
                return known ? rest : [...rest, current];
              });
            }, 200);
          };

          return (
            <div className="min-h-screen flex flex-col md:flex-row">
              {/* Sol Menü */}
              <aside className="w-full md:w-72 bg-white border-r border-slate-200 flex flex-col h-screen sticky top-0">
                <div className="p-6 bg-blue-600 text-white">
                  <h1 className="font-bold text-xl flex items-center gap-2">
                    <i className="fa-solid fa-graduation-cap"></i> İSG Kartları
                  </h1>
                </div>

                <div className="p-4 flex-1 overflow-y-auto custom-scrollbar">
                  <button onClick={startQuiz} className="w-full bg-slate-900 text-white p-4 rounded-xl flex items-center justify-center gap-3 mb-6 hover:scale-105 transition-transform">
                    <i className="fa-solid fa-brain"></i> Öğrenme Modu
                  </button>

                  <p className="text-[10px] font-bold text-slate-400 uppercase mb-2 px-2">Kategoriler</p>
                  {cats.map(c => (
                    <button key={c} onClick={() => { setView('cards'); setActiveCat(c); setSearch(""); }}
                      className={`w-full text-left p-3 rounded-lg text-sm mb-1 ${activeCat === c && view !== 'quiz' ? 'bg-blue-50 text-blue-600 font-bold' : 'text-slate-600 hover:bg-slate-50'}`}>
                      {c}
                    </button>
                  ))}
                </div>
              </aside>

              {/* Ana İçerik */}
              <main className="flex-1 p-6 md:p-10 bg-slate-50">
                {view === 'quiz' ? (
                  quizDeck.length > 0 ? (
                    <div className="max-w-xl mx-auto space-y-6">
                      <div className="flex justify-between items-center text-slate-500">
                        <span className="font-bold text-blue-600">Kalan: {quizDeck.length}</span>
                        <button onClick={() => setView('cards')} className="text-sm border-b border-slate-400">Çıkış Yap</button>
                      </div>
                      <FlashCard item={quizDeck[0]} isFlipped={isFlipped} onClick={() => setIsFlipped(!isFlipped)} isLarge={true} />
                      <div className="grid grid-cols-2 gap-4">
                        <button onClick={() => handleQuizNext(false)} className="bg-white border-2 border-red-100 p-5 rounded-2xl text-red-500 font-bold hover:bg-red-50">Bilemedim</button>
                        <button onClick={() => handleQuizNext(true)} className="bg-white border-2 border-green-100 p-5 rounded-2xl text-green-500 font-bold hover:bg-green-50">Biliyorum</button>
                      </div>
                    </div>
                  ) : <div className="text-center py-20"><h2>Bitti! 🚀</h2><button onClick={() => setView('cards')}>Geri Dön</button></div>
                ) : (
                  <div className="max-w-5xl mx-auto space-y-8">
                    <div className="relative">
                      <i className="fa-solid fa-magnifying-glass absolute left-4 top-4 text-slate-300"></i>
                      <input type="text" placeholder="Kelime ara..." value={search} onChange={(e) => setSearch(e.target.value)}
                        className="w-full p-4 pl-12 rounded-2xl border-none shadow-sm outline-none ring-2 ring-transparent focus:ring-blue-500 transition-all" />
                    </div>
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                      {list.map((item, i) => (
                        <FlashCard 
                          key={i} 
                          item={item} 
                          isFlipped={flippedStates[i]} 
                          onClick={() => setFlippedStates(prev => ({...prev, [i]: !prev[i]}))}
                        />
                      ))}
                    </div>
                  </div>
                )}
              </main>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
