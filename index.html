            { q: "CE işareti nedir ve kim koyar?", a: "Ürünün AB standartlarına uygunluğunu gösteren işarettir; üretici tarafından ürüne konulur." },
            { q: "PUWER'ın açılımı nedir ve ne zaman yürürlüğe girmiştir?", a: "Provision and Use of Work Equipment Regulation. 1993'te yürürlüğe girmiş, 1998'de güncellenmiştir." },
            { q: "PUWER'a göre bakım (maintenance) yükümlülüğü nedir?", a: "İş ekipmanı verimli durumda, verimli çalışır halde ve iyi onarım içinde tutulmalıdır; varsa bakım günlüğü güncel tutulmalıdır." },
            { q: "PUWER muayene (inspection) ne zaman yapılmak zorundadır?", a: "a) İlk kullanımdan önce kurulumun ardından, b) Yeni bir alanda veya konumda kurulumun ardından" },
            { q: "CE işaretli makinede acil durdurma ne anlama gelir?", a: "Makineyi anında güvenli bir duruma getirecek 'emergency stop' kontrolü bulunmalıdır." },
            { q: "Makine değişikliğinde risk değerlendirmesi sonucu 'HAYIR' çıkarsa ne yapılır?", a: "Ekipman üreticisiyle iletişime geçilir; üretici belgeleme ve değişiklik onayı yapar, gerekirse CE işareti yenilenir." },
            { q: "Bakım sayılan faaliyetler hangileridir?", a: "Ayarlama, servis, yağlama, temizlik, muayene, revizyon, onarım, küçük değişiklikler, yazılım değişiklikleri" },
            { q: "Büyük değişiklik veya yeniden tasarım bakım mıdır?", a: "Hayır; büyük değişiklikler ve yeniden tasarım bakım kapsamında sayılmaz, risk değerlendirmesi gerektirir." },
            { q: "Ekranlı araçlarda monitörün başlıca ergonomik gereksinimleri nelerdir?", a: "Titreşimsiz görüntü, kolay ayarlanabilir parlaklık/kontrast, her yöne döndürülebilir ekran, yansımasız yüzey" },
            { q: "Klavyenin rengi neden mat olmalıdır?", a: "Işığı yansıtmaması için; parlak yüzey göz yorgunluğuna ve yansımalara neden olur." },
            { q: "Klavye ve fare aynı yükseklikte olmalı; fare klavyenin neresinde olmalıdır?", a: "Fareyi klavyenin yanına yerleştirmek gerekir; her ikisi de aynı düzlemde olmalıdır." },
            { q: "Fare kullanırken bilek nasıl tutulmalıdır?", a: "Bilek düz ve düzgün bir hatta tutulmalı; sağa veya sola bükülmemelidir." },
            { q: "Ekranlı araç çalışmasında kesintisiz klavye kullanımı en fazla kaç dakika olmalıdır?", a: "40 dakika; bu süreden sonra mola verilmelidir." },
            { q: "20-20-20 benzeri göz dinlendirme kuralı ne diyor?", a: "Her 20 dakikada bir gözler ekrandan uzaklaştırılarak uzak bir noktaya odaklanılmalı; ardından 10-15 saniye gözler kapalı tutularak dinlendirilmelidir." },
            { q: "Ekranlı araç çalışmasında hangi 6 tür sağlık riski görülür?", a: "1) Kas-iskelet hastalıkları, 2) Göz sorunları, 3) Sinir sistemi bozuklukları, 4) Dolaşım sistemi bozuklukları, 5) Psikolojik bozukluklar, 6) Sindirim sistemi bozuklukları" },
            { q: "Monitörden gelen ışık yansıması ve titremesi hangi sağlık sorununa yol açar?", a: "Ciddi zihinsel/algısal yük ve göz gerginliğine; miyopi ve astigmat gibi bozuklukların derecesinin artmasına neden olabilir." },
            { q: "Ofis ortamındaki risk faktörlerinden biri olan 'tekrarlama' nasıl tanımlanır?", a: "Klavye veya bir aleti günlük 4 saatten fazla kesintisiz kullanmak tekrarlama risk faktörü sayılır." },
            { q: "Çalışma sandalyesinin hangi özelliklere sahip olması gerekir?", a: "Stabil ve hareketli, yüksekliği ayarlanabilir, öne-arkaya/yukarı-aşağıya ayarlanabilir sırt desteği, bel desteği sağlayan esnek yapı, gerektiğinde ayak desteği" },
            { q: "Elektrik nedir?", a: "Elektrik yüküne sahip maddenin varlığı ve hareketiyle ilişkili fiziksel olgular bütünüdür." },
            { q: "Elektrik akımının birimi nedir?", a: "Amper (A)" },
            { q: "Doğru akım (DC) ve Alternatif akım (AC) arasındaki temel fark nedir?", a: "DC'de akımın yönü ve büyüklüğü zamanla değişmez; AC'de ise zamanla değişir. Pil DC'nin, ev elektriği AC'nin klasik örneğidir." },
            { q: "Alçak gerilim ve yüksek gerilim sınırı nedir?", a: "Alçak gerilim: faz-faz gerilimi 1000 V ve altı. Yüksek gerilim: 1000 V üzeri." },
            { q: "Elektrik sigortası nasıl çalışır?", a: "Devreden geçen akım belirli değeri aşınca sigortanın metal tel/şeridi erir ve devre açılır (kesilir)." },
            { q: "Kaçak Akım Şalteri (RCCB) neden kullanılır?", a: "Gidiş ve dönüş iletkenlerindeki akım dengesizliğini (kaçak akımı) algılayarak devreyi anında keser; elektrik çarpmasına karşı koruma sağlar." },
            { q: "Elektrik akımının insan vücuduna 4 temel etkisi nedir?", a: "1) Kasılma (kas kasılması, solunum durabilir), 2) Kalp (kardiyak arrest, kalp kası hasarı), 3) Sıcaklık (cilt yanıkları), 4) Düşme (yüksekten çalışanlarda)" },
            { q: "Elektrik çarpan bir kişi neden kendiliğinden çarpan yerden ayrılamaz?", a: "Akım kasların kasılmasına neden olur; bu yüzden kişi tutunduğu yeri bırakamaz." },
            { q: "Elektrik çarpması durumunda ilk yapılacak 3 şey nedir?", a: "1) Sigortayı keserek elektriği kes, 2) Lastik tabanlı ayakkabı giy ve kuru lastik eldiven tak, 3) Kişiyle temas etmeden önce iletken nesneleri yalıtım çubuğuyla uzaklaştır." },
            { q: "Elektrik çarpan kişiye çıplak elle dokunmak neden tehlikelidir?", a: "Kurtarıcı da elektriğe kapılır; gerilim kesilmeden temas kurulmamalıdır." },
            { q: "Elektrik iş kazalarının en sık nedenleri nelerdir? 3'ünü say.", a: "Yetersiz eğitim, yetersiz/bozuk yalıtım, KKD kullanmama, aşırı özgüven, kalitesiz malzeme, yetkisiz arıza müdahalesi" },
            { q: "'Sigortayı yeniden sarmak' neden yasaktır?", a: "Sigortayı sararak onarmak, aşırı akımı sınırlayan güvenliği ortadan kaldırır ve yangın/çarpma riskini artırır; otomatik sigorta kullanılmalıdır." },
            { q: "Portatif uzatma kablosu kullanılmadığında yapılmaması gerekenler nelerdir?", a: "Prizde takılı bırakılmamalı, yerde bırakılmamalı, ek kablo eklenmemeli, hasarlı/ezilmiş kablo kullanılmamalı." },
            { q: "Elektrik panosunun önüne neden hiçbir şey konulmamalıdır?", a: "Acil durumda panoya hızlı erişimi engelleyen her nesne hayati tehlike oluşturabilir." },
            { q: "Elektrik bakım-onarım öncesinde alınacak ilk önlem nedir?", a: "Ekipman enerji kaynağından bağlantısı kesilmeli; akımı kesen şalterlerin kapalı kaldığı ve kilitli olduğu sağlanmalıdır." },
            { q: "Elektrikle ilgili çalışmada topraklı fiş neden kullanılmalıdır?", a: "Topraklama, kaçak akımı güvenle toprağa iletir ve kişinin çarpılmasını önler." },
            { q: "El aletlerinin yalıtımlı olması ne anlama gelir?", a: "Kerpeten, tornavida gibi aletlerin sapları elektriği iletmeyen (yalıtkan) malzemeyle kaplanmış olması; akımın kullanıcıya geçmesini engeller." },
            { q: "Güç aletleri hangi durumlarda kullanılmamalıdır?", a: "Hasarlı topraklama, aşırı kıvılcım, hasarlı priz/fiş/şalter veya bağlantı kablosu varsa kullanılmamalıdır." },
            { q: "Elektrik çarpmasında 112'yi aramak dışında yapılacak ilk müdahale adımlarını sırala.", a: "1) Elektriği kes (sigorta), 2) Kişiye yaklaşmadan önce yalıtım sağla (ayakkabı, eldiven), 3) Kişiyi kıyafetinden tutarak çek, 4) İlk yardım uygula, 5) 112'yi ara" },
            { q: "İşyeri aydınlatma mevzuatına göre temel ilke nedir?", a: "İşyerleri yeterli doğal ışıkla aydınlatılmalıdır; yetersiz kalınca veya gece vardiyasında yapay aydınlatma sağlanmalıdır." },
            { q: "Kimyasal madde kaplarında neden etiket zorunludur?", a: "Maddenin kimliğini, tehlikelerini ve güvenlik bilgilerini bildirmek için; etiketsiz kap kullanımı ciddi güvenlik riski ve yasal ihlal oluşturur." },
            { q: "Hafif fiziksel çalışma için önerilen ortam sıcaklığı nedir?", a: "18,3°C" },
            { q: "Ağır endüstriyel çalışma için önerilen ortam sıcaklığı aralığı nedir?", a: "12,8°C – 15,6°C" },
            { q: "Titreşimli alet kullanırken aleti ne kadar sıkı tutmak uygundur?", a: "Mümkün olduğunca gevşek tutulmalıdır; sıkı kavramak el-kol titreşim maruziyetini artırır." },
            { q: "Kimyasal maddenin 'ikame' yoluyla değiştirilmesi ne anlama gelir?", a: "Tehlikeli bir kimyasalın daha az tehlikeli veya tehlikesiz bir maddeyle değiştirilmesidir; kaynakta alınan en etkin önlemdir." },
            { q: "MGBF'de 'toksikolojik bilgi' başlığı ne içerir?", a: "Maddenin organizmaları nasıl etkilediğine dair bilgileri (zehirlilik, etki yolları, akut/kronik etkiler vb.)" },
            { q: "Kaçak Akım Şalteri aylık olarak ne için kontrol edilmelidir?", a: "Cihazın çalışır durumda olduğunu doğrulamak için; işlev görmeyen bir şalter elektrik çarpmalarına karşı koruma sağlamaz." },
            { q: "Radyasyon korumasının amacı nedir?", a: "İnsanlar için uygun koruma düzeyini sağlamak ve zararlı etkilerin (özellikle kanser, genetik bozukluk) oluşmasını önlemektir." },
            { q: "Ergonomi eğitiminin bel ağrısı üzerindeki kanıtlanmış etkisi nedir?", a: "Ergonomi eğitimi ve iyileştirmelerinin bel ağrısı sıklığını ve maliyetini %50'nin üzerinde azalttığı bilimsel olarak gösterilmiştir." },
            { q: "İş sağlığı ve güvenliği çerçevesinde KKD'nin yeri nedir?", a: "KKD (Kişisel Koruyucu Donanım) en son başvurulacak önlemdir. Önce kaynakta, sonra ortamda önlemler alınmalı; yeterli olmadığında KKD devreye girmelidir. Ancak gerektiğinde kullanımı zorunludur." }
        ];

        // -------------------------
        // SÖZLÜK KELİME KARTI BİLEŞENİ
        // -------------------------
        const FlashCard = ({ item, isFlipped, onClick, isLarge = false, onDelete }) => {
          const height = isLarge ? "h-64 md:h-80" : "h-52 md:h-60";
          return (
            <div className={`perspective-1000 w-full ${height} cursor-pointer relative group`} onClick={onClick}>
              
              {/* SİLME BUTONU */}
              {onDelete && (
                <button 
                  onClick={(e) => { e.stopPropagation(); onDelete(); }}
                  className="absolute top-3 right-3 z-10 bg-red-100 text-red-500 w-10 h-10 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity hover:bg-red-500 hover:text-white shadow-sm"
                  title="Kelimeyi Sil"
                >
                  <i className="fa-solid fa-trash"></i>
                </button>
              )}

              <div className={`relative w-full h-full transition-all duration-500 preserve-3d ${isFlipped ? 'rotate-y-180' : ''}`}>
                <div className="absolute inset-0 bg-white border-2 border-slate-100 rounded-2xl shadow-sm flex flex-col items-center justify-center p-6 backface-hidden">
                  <span className="text-slate-400 text-[10px] font-bold uppercase mb-4 tracking-widest">English</span>
                  <h3 className={`${isLarge ? 'text-3xl' : 'text-xl'} font-bold text-slate-800 text-center`}>{item.en}</h3>
                  <i className="fa-solid fa-rotate text-slate-200 mt-6"></i>
                </div>
                <div className="absolute inset-0 bg-blue-600 rounded-2xl shadow-xl flex flex-col items-center justify-center p-6 rotate-y-180 backface-hidden text-white">
                  <span className="text-blue-200 text-[10px] font-bold uppercase mb-4 tracking-widest">Türkçe</span>
                  <h3 className={`${isLarge ? 'text-3xl' : 'text-xl'} font-bold text-center`}>{item.tr}</h3>
                </div>
              </div>
            </div>
          );
        };

        // -------------------------
        // ANA UYGULAMA (APP)
        // -------------------------
        const App = () => {
          const [view, setView] = useState('cards'); 
          const [activeCat, setActiveCat] = useState("A – KİMYASALLAR");
          const [search, setSearch] = useState("");
          const [flippedStates, setFlippedStates] = useState({});

          // ==========================================
          // LOCAL STORAGE BAĞLANTILARI (KALICI HAFIZA)
          // ==========================================
          
          // 1. KELİME LİSTESİ
          const [vocabData, setVocabData] = useState(() => {
            const savedData = localStorage.getItem('isg_vocab_data');
            return savedData ? JSON.parse(savedData) : INITIAL_VOCAB_DATA;
          });

          useEffect(() => {
            localStorage.setItem('isg_vocab_data', JSON.stringify(vocabData));
          }, [vocabData]);

          // 2. TEST SORULARI
          const [customQuestions, setCustomQuestions] = useState(() => {
            const savedQs = localStorage.getItem('isg_custom_questions');
            return savedQs ? JSON.parse(savedQs) : INITIAL_QUIZ_QUESTIONS;
          });

          useEffect(() => {
            localStorage.setItem('isg_custom_questions', JSON.stringify(customQuestions));
          }, [customQuestions]);

          // ---- YENİ KELİME EKLEME STATE'LERİ ----
          const [newWordEn, setNewWordEn] = useState("");
          const [newWordTr, setNewWordTr] = useState("");

          // ---- ÖĞRENME MODU (Kart Destesi) State'leri ----
          const [flashcardDeck, setFlashcardDeck] = useState([]);
          const [isFlashcardFlipped, setIsFlashcardFlipped] = useState(false);

          // ---- 100 BİLGİ KARTI MODU State'leri ----
          const [activeInfoDeck, setActiveInfoDeck] = useState(false);
          const [infoIndex, setInfoIndex] = useState(0);
          const [isInfoFlipped, setIsInfoFlipped] = useState(false);

          // ---- TEST MODU State'leri ----
          const [currentQIndex, setCurrentQIndex] = useState(0);
          const [score, setScore] = useState(0);
          const [showTestResult, setShowTestResult] = useState(false);
          const [selectedOption, setSelectedOption] = useState(null);
          
          // Soru Ekleme Formu State'leri
          const [newQText, setNewQText] = useState("");
          const [newQOptions, setNewQOptions] = useState(["", "", "", ""]);
          const [newQAnswerIndex, setNewQAnswerIndex] = useState(0);

          // Dinamik Filtreleme
          const filteredList = useMemo(() => {
            if (search) {
              return Object.values(vocabData).flat().filter(w => 
                w.en.toLowerCase().includes(search.toLowerCase()) || 
                w.tr.toLowerCase().includes(search.toLowerCase())
              );
            }
            return vocabData[activeCat] || [];
          }, [search, activeCat, vocabData]);

          // --- KELİME EKLEME VE SİLME FONKSİYONLARI ---
          const handleAddWord = (e) => {
              e.preventDefault();
              if (!newWordEn.trim() || !newWordTr.trim()) return;

              setVocabData(prev => {
                  const newData = { ...prev };
                  newData[activeCat] = [{ en: newWordEn, tr: newWordTr }, ...newData[activeCat]];
                  return newData;
              });

              setNewWordEn("");
              setNewWordTr("");
              alert(`"${newWordEn}" kelimesi ${activeCat} kategorisine eklendi ve kaydedildi!`);
          };

          const handleDeleteWord = (wordEn, wordTr) => {
              if(!window.confirm(`"${wordEn}" kelimesini silmek istediğinize emin misiniz?`)) return;

              setVocabData(prev => {
                  const newData = { ...prev };
                  for (let cat in newData) {
                      newData[cat] = newData[cat].filter(w => w.en !== wordEn || w.tr !== wordTr);
                  }
                  return newData;
              });
          };

          // --- SÖZLÜK ÖĞRENME MODU FONKSİYONLARI ---
          const startFlashcardQuiz = () => {
            const all = Object.values(vocabData).flat().sort(() => Math.random() - 0.5);
            setFlashcardDeck(all);
            setView('quiz');
            setIsFlashcardFlipped(false);
          };

          const handleFlashcardNext = (known) => {
            setIsFlashcardFlipped(false);
            setTimeout(() => {
              setFlashcardDeck(prev => {
                const rest = prev.slice(1);
                return known ? rest : [...rest, prev[0]];
              });
            }, 200);
          };

          // --- TEST FONKSİYONLARI ---
          const handleAnswerClick = (option) => {
            if (selectedOption) return;
            setSelectedOption(option);
            if (option === customQuestions[currentQIndex].answer) {
              setScore(score + 1);
            }
            setTimeout(() => {
              if (currentQIndex + 1 < customQuestions.length) {
                setCurrentQIndex(currentQIndex + 1);
                setSelectedOption(null);
              } else {
                setShowTestResult(true);
              }
            }, 1000);
          };

          const resetTest = () => {
            setCurrentQIndex(0);
            setScore(0);
            setShowTestResult(false);
            setSelectedOption(null);
          };

          // --- TEST İÇİN MANUEL SORU EKLEME FONKSİYONLARI ---
          const handleAddQuestion = (e) => {
            e.preventDefault();
            if (!newQText || newQOptions.some(opt => opt.trim() === "")) {
                alert("Lütfen soruyu ve tüm şıkları doldurun!");
                return;
            }
            const newQuestion = {
                question: newQText,
                options: [...newQOptions],
                answer: newQOptions[newQAnswerIndex]
            };
            setCustomQuestions([...customQuestions, newQuestion]);
            alert("Soru başarıyla kaydedildi!");
            setNewQText("");
            setNewQOptions(["", "", "", ""]);
            setNewQAnswerIndex(0);
          };

          const handleOptionChange = (index, value) => {
              const updatedOptions = [...newQOptions];
              updatedOptions[index] = value;
              setNewQOptions(updatedOptions);
          };

          return (
            <div className="min-h-screen flex flex-col md:flex-row font-sans">
              
              {/* SOL MENÜ */}
              <aside className="w-full md:w-72 bg-white border-r border-slate-200 p-6 flex flex-col h-screen sticky top-0 overflow-hidden">
                <div className="bg-blue-600 p-5 rounded-2xl text-white mb-6 shadow-lg shadow-blue-100">
                  <h1 className="font-black text-xl flex items-center gap-2 italic">
                    <i className="fa-solid fa-bolt"></i> İSG PORTAL
                  </h1>
                </div>

                <div className="flex-1 overflow-y-auto custom-scrollbar pr-2 space-y-6">
                    {/* MOD BUTONLARI */}
                    <div className="space-y-2">
                        <button onClick={() => {setView('cards'); setActiveInfoDeck(false);}} className={`w-full p-3 rounded-xl flex items-center gap-3 font-bold transition-all ${view === 'cards' ? 'bg-slate-900 text-white shadow-md' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}>
                            <i className="fa-solid fa-layer-group w-5"></i> Kelime Kartları
                        </button>
                        <button onClick={() => {startFlashcardQuiz(); setActiveInfoDeck(false);}} className={`w-full p-3 rounded-xl flex items-center gap-3 font-bold transition-all ${view === 'quiz' ? 'bg-indigo-600 text-white shadow-md' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}>
                            <i className="fa-solid fa-brain w-5"></i> Sözlük Pratiği
                        </button>
                        <button onClick={() => setView('learn')} className={`w-full p-3 rounded-xl flex items-center gap-3 font-bold transition-all ${view === 'learn' ? 'bg-amber-500 text-white shadow-md' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}>
                            <i className="fa-solid fa-book-open w-5"></i> Konu Öğrenme
                        </button>
                        <button onClick={() => {setView('test'); resetTest(); setActiveInfoDeck(false);}} className={`w-full p-3 rounded-xl flex items-center gap-3 font-bold transition-all ${view === 'test' ? 'bg-green-600 text-white shadow-md' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}>
                            <i className="fa-solid fa-pen-to-square w-5"></i> Test Çöz
                        </button>
                    </div>

                    {/* KATEGORİLER (Sadece Kartlar modunda aktif) */}
                    {view === 'cards' && (
                        <div>
                            <p className="text-[10px] font-black text-slate-400 uppercase mb-3 tracking-widest border-t pt-4">KATEGORİLER</p>
                            {Object.keys(vocabData).map(c => (
                            <button key={c} onClick={() => { setActiveCat(c); setSearch(""); }}
                                className={`w-full text-left p-3 rounded-xl text-sm mb-1 transition-all ${activeCat === c ? 'bg-blue-50 text-blue-700 font-bold border-l-4 border-blue-600' : 'text-slate-500 hover:bg-slate-50'}`}>
                                {c}
                            </button>
                            ))}
                        </div>
                    )}
                </div>
              </aside>

              {/* ANA İÇERİK */}
              <main className="flex-1 p-6 md:p-12">
                
                {/* MOD 1: KELİME KARTLARI (Galeri + Ekleme Formu) */}
                {view === 'cards' && (
                  <div className="max-w-5xl mx-auto space-y-8">
                    
                    {/* ARAMA VE EKLEME KISMI */}
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div className="relative group">
                          <i className="fa-solid fa-magnifying-glass absolute left-5 top-5 text-slate-300 group-focus-within:text-blue-500 transition-colors"></i>
                          <input type="text" placeholder="Kelime ara..." value={search} onChange={(e) => setSearch(e.target.value)}
                            className="w-full h-full p-5 pl-14 rounded-3xl border border-slate-200 shadow-sm outline-none focus:ring-2 focus:ring-blue-500 transition-all text-lg" />
                        </div>

                        <form onSubmit={handleAddWord} className="bg-white p-4 rounded-3xl border border-slate-200 shadow-sm flex flex-col sm:flex-row gap-3">
                            <div className="flex-1 flex flex-col gap-2">
                                <input type="text" placeholder="İngilizce (Örn: Safety)" value={newWordEn} onChange={e=>setNewWordEn(e.target.value)} className="w-full p-2 px-3 rounded-xl border border-slate-100 bg-slate-50 text-sm outline-none focus:border-blue-300" required />
                                <input type="text" placeholder="Türkçe (Örn: Güvenlik)" value={newWordTr} onChange={e=>setNewWordTr(e.target.value)} className="w-full p-2 px-3 rounded-xl border border-slate-100 bg-slate-50 text-sm outline-none focus:border-blue-300" required />
                            </div>
                            <button type="submit" className="bg-blue-600 text-white px-6 rounded-2xl font-bold hover:bg-blue-700 transition-colors flex items-center justify-center gap-2">
                                <i className="fa-solid fa-plus"></i> Ekle
                            </button>
                        </form>
                    </div>

                    <div className="flex items-center justify-between border-b pb-2">
                        <h2 className="text-xl font-black text-slate-700">{search ? "Arama Sonuçları" : activeCat}</h2>
                        <span className="text-slate-400 text-sm font-bold">{filteredList.length} Terim</span>
                    </div>

                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
                      {filteredList.map((item, i) => (
                        <FlashCard 
                          key={i} 
                          item={item} 
                          isFlipped={flippedStates[i]} 
                          onClick={() => setFlippedStates(prev => ({...prev, [i]: !prev[i]}))}
                          onDelete={() => handleDeleteWord(item.en, item.tr)}
                        />
                      ))}
                    </div>
                  </div>
                )}

                {/* MOD 2: SÖZLÜK ÖĞRENME MODU */}
                {view === 'quiz' && (
                  flashcardDeck.length > 0 ? (
                    <div className="max-w-xl mx-auto space-y-8">
                      <div className="flex justify-between items-center text-slate-400 font-bold">
                        <span><i className="fa-solid fa-layer-group"></i> Kalan Kart: {flashcardDeck.length}</span>
                        <button onClick={() => setView('cards')} className="hover:text-red-500">Çıkış <i className="fa-solid fa-xmark"></i></button>
                      </div>
                      <FlashCard item={flashcardDeck[0]} isFlipped={isFlashcardFlipped} onClick={() => setIsFlashcardFlipped(!isFlashcardFlipped)} isLarge={true} />
                      <div className="grid grid-cols-2 gap-4">
                        <button onClick={() => handleFlashcardNext(false)} className="bg-white border-2 border-red-100 p-6 rounded-3xl text-red-500 font-black hover:bg-red-50 transition-all">BİLEMEDİM</button>
                        <button onClick={() => handleFlashcardNext(true)} className="bg-white border-2 border-green-100 p-6 rounded-3xl text-green-500 font-black hover:bg-green-50 transition-all">BİLİYORUM</button>
                      </div>
                    </div>
                  ) : (
                    <div className="text-center py-20">
                        <div className="w-24 h-24 bg-indigo-100 text-indigo-500 rounded-full flex items-center justify-center text-4xl mx-auto mb-6">
                            <i className="fa-solid fa-crown"></i>
                        </div>
                        <h2 className="text-4xl font-black mb-4 text-slate-800">Şampiyon!</h2>
                        <p className="text-slate-500 mb-6">Eklediğin yeni kelimeler dahil tüm desteyi bitirdin.</p>
                        <button onClick={() => setView('cards')} className="bg-blue-600 text-white px-8 py-4 rounded-2xl font-bold shadow-lg hover:bg-blue-700 transition-colors">Kartlara Geri Dön</button>
                    </div>
                  )
                )}

                {/* MOD 3: KONU ÖĞRENME (100 Bilgi Kartı + PDF Özetleri) */}
                {view === 'learn' && (
                    activeInfoDeck ? (
                        <div className="max-w-2xl mx-auto space-y-6">
                            <div className="flex justify-between items-center text-slate-500 font-bold">
                                <span>100 Bilgi Kartı: Soru {infoIndex + 1} / {INFO_CARDS_DATA.length}</span>
                                <button onClick={() => {setActiveInfoDeck(false); setInfoIndex(0); setIsInfoFlipped(false);}} className="hover:text-red-500">
                                    Çıkış <i className="fa-solid fa-xmark"></i>
                                </button>
                            </div>
                            
                            <div className="perspective-1000 w-full h-96 cursor-pointer" onClick={() => setIsInfoFlipped(!isInfoFlipped)}>
                                <div className={`relative w-full h-full transition-all duration-500 preserve-3d ${isInfoFlipped ? 'rotate-y-180' : ''}`}>
                                    {/* Ön Yüz (Soru) */}
                                    <div className="absolute inset-0 bg-white border-2 border-amber-200 rounded-3xl shadow-md flex flex-col items-center justify-center p-8 backface-hidden">
                                        <span className="text-amber-500 text-sm font-bold uppercase mb-6 tracking-widest">Soru / Kavram</span>
                                        <h3 className="text-2xl md:text-3xl font-bold text-slate-800 text-center leading-snug">{INFO_CARDS_DATA[infoIndex].q}</h3>
                                        <p className="text-slate-400 text-sm mt-8 animate-pulse"><i className="fa-solid fa-rotate"></i> Cevap için tıkla</p>
                                    </div>
                                    {/* Arka Yüz (Cevap) */}
                                    <div className="absolute inset-0 bg-gradient-to-br from-amber-500 to-orange-500 rounded-3xl shadow-xl flex flex-col items-center justify-center p-8 rotate-y-180 backface-hidden text-white">
                                        <span className="text-amber-100 text-sm font-bold uppercase mb-6 tracking-widest">Cevap / Açıklama</span>
                                        <h3 className="text-xl md:text-2xl font-bold text-center leading-relaxed">{INFO_CARDS_DATA[infoIndex].a}</h3>
                                    </div>
                                </div>
                            </div>

                            <div className="flex justify-between gap-4 mt-4">
                                <button 
                                    onClick={() => {if(infoIndex > 0) {setInfoIndex(infoIndex-1); setIsInfoFlipped(false);}}} 
                                    disabled={infoIndex === 0} 
                                    className="flex-1 bg-slate-200 p-5 rounded-2xl font-bold text-slate-600 disabled:opacity-50 hover:bg-slate-300 transition-colors"
                                >
                                    <i className="fa-solid fa-arrow-left"></i> Önceki
                                </button>
                                <button 
                                    onClick={() => {if(infoIndex < INFO_CARDS_DATA.length - 1) {setInfoIndex(infoIndex+1); setIsInfoFlipped(false);}}} 
                                    disabled={infoIndex === INFO_CARDS_DATA.length - 1} 
                                    className="flex-1 bg-amber-500 p-5 rounded-2xl font-bold text-white disabled:opacity-50 hover:bg-amber-600 transition-colors"
                                >
                                    Sonraki <i className="fa-solid fa-arrow-right"></i>
                                </button>
                            </div>
                        </div>
                    ) : (
                        <div className="max-w-4xl mx-auto space-y-8">
                            <div className="flex flex-col md:flex-row md:items-center justify-between gap-4 border-b-4 border-amber-500 pb-4">
                                <h2 className="text-3xl font-black text-slate-800">Ders Notları Özetleri</h2>
                                <button onClick={() => setActiveInfoDeck(true)} className="bg-amber-500 text-white px-6 py-3 rounded-xl font-bold shadow-md hover:bg-amber-600 transition-colors flex items-center gap-2">
                                    <i className="fa-solid fa-layer-group"></i> 100 BİLGİ DESTESİNE BAŞLA
                                </button>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                {LECTURE_DATA.map((lec, i) => (
                                    <div key={i} className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 hover:shadow-md transition-shadow">
                                        <div className="w-12 h-12 bg-amber-100 text-amber-600 rounded-2xl flex items-center justify-center mb-4 text-xl">
                                            <i className="fa-solid fa-bookmark"></i>
                                        </div>
                                        <h3 className="text-xl font-bold text-slate-800 mb-3">{lec.title}</h3>
                                        <p className="text-slate-600 leading-relaxed text-sm">{lec.content}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )
                )}

                {/* MOD 4: TEST (QUIZ) ve SORU EKLEME */}
                {view === 'test' && (
                    <div className="max-w-3xl mx-auto space-y-8">
                        
                        <div className="bg-white p-8 rounded-3xl shadow-md border border-slate-100">
                            {!showTestResult ? (
                                <div>
                                    <div className="flex justify-between items-center mb-6 text-sm font-bold text-slate-400">
                                        <span>Soru {currentQIndex + 1} / {customQuestions.length}</span>
                                        <span className="text-green-500">Skor: {score}</span>
                                    </div>
                                    <h3 className="text-2xl font-bold text-slate-800 mb-8">{customQuestions[currentQIndex].question}</h3>
                                    <div className="space-y-3">
                                        {customQuestions[currentQIndex].options.map((opt, i) => {
                                            let btnClass = "bg-slate-50 border-2 border-slate-100 hover:border-blue-300 hover:bg-blue-50 text-slate-700";
                                            if (selectedOption) {
                                                if (opt === customQuestions[currentQIndex].answer) btnClass = "bg-green-100 border-2 border-green-500 text-green-800 font-bold";
                                                else if (opt === selectedOption) btnClass = "bg-red-100 border-2 border-red-500 text-red-800 font-bold";
                                                else btnClass = "bg-slate-50 border-2 border-slate-100 opacity-50";
                                            }

                                            return (
                                                <button 
                                                    key={i} 
                                                    onClick={() => handleAnswerClick(opt)}
                                                    className={`w-full text-left p-4 rounded-2xl transition-all ${btnClass}`}
                                                    disabled={selectedOption !== null}
                                                >
                                                    {String.fromCharCode(65 + i)}) {opt}
                                                </button>
                                            );
                                        })}
                                    </div>
                                </div>
                            ) : (
                                <div className="text-center py-10">
                                    <div className="w-24 h-24 bg-green-100 text-green-500 rounded-full flex items-center justify-center text-4xl mx-auto mb-6">
                                        <i className="fa-solid fa-trophy"></i>
                                    </div>
                                    <h2 className="text-3xl font-black text-slate-800 mb-2">Test Bitti!</h2>
                                    <p className="text-xl text-slate-600 mb-8">Doğru Sayısı: <span className="font-bold text-green-600">{score}</span> / {customQuestions.length}</p>
                                    <button onClick={resetTest} className="bg-blue-600 text-white px-8 py-4 rounded-2xl font-bold shadow-lg hover:bg-blue-700 transition-colors">
                                        Yeniden Çöz
                                    </button>
                                </div>
                            )}
                        </div>

                        <div className="bg-slate-100 p-8 rounded-3xl border border-slate-200">
                            <h3 className="text-xl font-bold text-slate-800 mb-6 flex items-center gap-2">
                                <i className="fa-solid fa-circle-plus text-blue-600"></i> Kendi Sorunu Ekle (Hafızaya Kaydolur)
                            </h3>
                            <form onSubmit={handleAddQuestion} className="space-y-4">
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 uppercase mb-2">Soru Metni</label>
                                    <textarea required value={newQText} onChange={(e) => setNewQText(e.target.value)} className="w-full p-4 rounded-xl border-none shadow-sm focus:ring-2 focus:ring-blue-500 outline-none resize-none h-24" placeholder="Soru yazınız..."></textarea>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    {newQOptions.map((opt, i) => (
                                        <div key={i}>
                                            <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Şık {String.fromCharCode(65 + i)}</label>
                                            <div className="flex items-center gap-2">
                                                <input type="radio" name="correctAnswer" checked={newQAnswerIndex === i} onChange={() => setNewQAnswerIndex(i)} className="w-5 h-5 text-blue-600 cursor-pointer" />
                                                <input required type="text" value={opt} onChange={(e) => handleOptionChange(i, e.target.value)} className="w-full p-3 rounded-xl border-none shadow-sm focus:ring-2 focus:ring-blue-500 outline-none" placeholder={`Şık ${String.fromCharCode(65 + i)}...`} />
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <p className="text-xs text-slate-500 italic">Doğru cevabı belirtmek için şıkkın yanındaki yuvarlağı seçin.</p>
                                <button type="submit" className="w-full bg-slate-900 text-white p-4 rounded-xl font-bold hover:bg-black transition-colors">
                                    Soruyu Teste Ekle
                                </button>
                            </form>
                        </div>

                    </div>
                )}

              </main>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
```
