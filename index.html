        const FlashCard = ({ item, externalFlipped = null, onFlipRequest = null, isLarge = false }) => {
          const [internalFlipped, setInternalFlipped] = useState(false);
          const isFlipped = externalFlipped !== null ? externalFlipped : internalFlipped;

          const handleClick = () => {
            if (onFlipRequest) onFlipRequest();
            else setInternalFlipped(!internalFlipped);
          };

          const containerHeight = isLarge ? "h-64 md:h-80" : "h-56 md:h-60";
          const titleSize = isLarge ? "text-2xl md:text-3xl" : "text-lg md:text-xl";
          const paddingSize = isLarge ? "p-8" : "p-4 md:p-6";

          return (
            <div className={`perspective-1000 w-full ${containerHeight} cursor-pointer group select-none`} onClick={handleClick}>
              <div className={`relative w-full h-full transition-all duration-500 preserve-3d ${isFlipped ? 'rotate-y-180' : ''}`}>
                <div className={`absolute inset-0 bg-white border-2 border-slate-100 rounded-2xl md:rounded-3xl shadow-sm flex flex-col items-center justify-center ${paddingSize} backface-hidden group-hover:border-blue-200 transition-colors`}>
                  <span className="text-slate-400 text-[10px] md:text-xs font-bold uppercase tracking-widest mb-2 md:mb-4">English</span>
                  <h3 className={`${titleSize} font-bold text-slate-800 text-center leading-tight overflow-hidden text-ellipsis px-2`}>{item.en}</h3>
                  <div className="absolute bottom-4 md:bottom-6 text-slate-300 flex items-center gap-2 text-[10px] md:text-xs">
                    <RotateCw size={14} /> Çevirmek için tıkla
                  </div>
                </div>
                <div className={`absolute inset-0 bg-blue-600 border-2 border-blue-600 rounded-2xl md:rounded-3xl shadow-xl flex flex-col items-center justify-center ${paddingSize} rotate-y-180 backface-hidden`}>
                  <span className="text-blue-200 text-[10px] md:text-xs font-bold uppercase tracking-widest mb-2 md:mb-4">Türkçe</span>
                  <h3 className={`${titleSize} font-bold text-white text-center leading-tight px-2`}>{item.tr}</h3>
                  <div className="absolute bottom-4 md:bottom-6 text-blue-200/50 text-[10px] md:text-xs">Geri dönmek için tıkla</div>
                </div>
              </div>
            </div>
          );
        };

        const QuizMode = () => {
          const [deck, setDeck] = useState([]);
          const [isFlipped, setIsFlipped] = useState(false);
          const [initialCount, setInitialCount] = useState(0);

          useEffect(() => {
            const allWords = Object.values(VOCAB_DATA).flat();
            const shuffled = [...allWords].sort(() => Math.random() - 0.5);
            setDeck(shuffled);
            setInitialCount(allWords.length);
          }, []);

          const handleKnown = (e) => {
            e.stopPropagation();
            setIsFlipped(false);
            setTimeout(() => setDeck(prev => prev.slice(1)), 200);
          };

          const handleUnknown = (e) => {
            e.stopPropagation();
            setIsFlipped(false);
            setTimeout(() => {
              setDeck(prev => {
                const current = prev[0];
                const rest = prev.slice(1);
                const insertAt = Math.min(rest.length, 5);
                const newDeck = [...rest];
                newDeck.splice(insertAt, 0, current);
                return newDeck;
              });
            }, 200);
          };

          if (deck.length === 0 && initialCount > 0) {
            return (
              <div className="flex flex-col items-center justify-center py-20 bg-white rounded-3xl shadow-sm border border-slate-100 text-center p-8 max-w-lg mx-auto">
                <div className="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mb-6"><CheckCircle2 size={32} /></div>
                <h2 className="text-2xl font-bold text-slate-800 mb-2">Harika!</h2>
                <p className="text-slate-500 mb-8">Tüm desteyi tamamladınız. Hafızanız harika!</p>
                <button onClick={() => window.location.reload()} className="w-full bg-blue-600 text-white px-8 py-3 rounded-xl font-semibold hover:bg-blue-700 transition-all flex items-center justify-center gap-2">
                  <RefreshCcw size={20} /> Yeniden Başla
                </button>
              </div>
            );
          }

          const currentCard = deck[0];
          const progress = initialCount > 0 ? ((initialCount - deck.length) / initialCount) * 100 : 0;

          return (
            <div className="max-w-xl mx-auto space-y-8">
              <div className="space-y-3">
                <div className="flex justify-between items-end px-1">
                  <div className="flex items-center gap-2"><Brain className="text-blue-600" size={18} /><span className="font-bold text-slate-700">Öğrenme Modu</span></div>
                  <span className="text-slate-400 text-sm font-medium">Kalan: {deck.length}</span>
                </div>
                <div className="h-2 w-full bg-slate-200 rounded-full overflow-hidden">
                  <div className="h-full bg-blue-600 transition-all duration-500" style={{ width: `${progress}%` }} />
                </div>
              </div>
              {currentCard && <FlashCard item={currentCard} externalFlipped={isFlipped} onFlipRequest={() => setIsFlipped(!isFlipped)} isLarge={true} />}
              <div className="grid grid-cols-2 gap-4">
                <button onClick={handleUnknown} className="flex flex-col items-center gap-1 p-5 rounded-2xl bg-white border-2 border-slate-100 hover:border-red-100 hover:bg-red-50 text-slate-500 hover:text-red-600 transition-all">
                  <XCircle size={28} /><span className="font-bold text-sm">Bilemedim</span>
                </button>
                <button onClick={handleKnown} className="flex flex-col items-center gap-1 p-5 rounded-2xl bg-white border-2 border-slate-100 hover:border-green-100 hover:bg-green-50 text-slate-500 hover:text-green-600 transition-all">
                  <CheckCircle2 size={28} /><span className="font-bold text-sm">Biliyorum</span>
                </button>
              </div>
            </div>
          );
        };

        const App = () => {
          const [search, setSearch] = useState("");
          const [activeCategory, setActiveCategory] = useState("A – KİMYASALLAR");
          const [viewMode, setViewMode] = useState('cards');
          const categories = Object.keys(VOCAB_DATA);

          const filteredWords = useMemo(() => {
            let words = [];
            if (search) {
              Object.keys(VOCAB_DATA).forEach(cat => {
                const matching = VOCAB_DATA[cat].filter(w => w.en.toLowerCase().includes(search.toLowerCase()) || w.tr.toLowerCase().includes(search.toLowerCase()));
                words.push(...matching);
              });
            } else words = VOCAB_DATA[activeCategory];
            return words;
          }, [search, activeCategory]);

          return (
            <div className="min-h-screen bg-slate-50 flex flex-col md:flex-row font-sans text-slate-900">
              <aside className="w-full md:w-80 bg-white border-r border-slate-200 flex flex-col sticky top-0 h-screen overflow-hidden z-20">
                <div className="p-6 border-b border-slate-100 bg-blue-600">
                  <div className="flex items-center gap-3 text-white mb-1"><BookOpen size={22} /><h1 className="text-lg font-bold">İSG Çalışma Rehberi</h1></div>
                  <p className="text-blue-100 text-[10px] uppercase tracking-wider font-semibold">İngilizce - Türkçe Sözlük</p>
                </div>
                <div className="flex-1 overflow-y-auto p-4 custom-scrollbar">
                  <div className="space-y-1">
                    <button onClick={() => { setViewMode('quiz'); setSearch(""); }} className={`w-full flex items-center gap-3 p-4 rounded-xl text-left transition-all mb-6 ${viewMode === 'quiz' ? "bg-blue-600 text-white shadow-lg shadow-blue-200 font-bold" : "bg-slate-900 text-white hover:bg-slate-800"}`}>
                      <Brain size={18} /><span className="text-sm">Öğrenme Modu</span>
                    </button>
                    <div className="px-3 py-2 text-[10px] font-bold text-slate-400 uppercase tracking-widest">Kategoriler</div>
                    {categories.map((cat) => (
                      <button key={cat} onClick={() => { setActiveCategory(cat); setSearch(""); if (viewMode === 'quiz') setViewMode('cards'); }} className={`w-full flex items-center justify-between p-3 rounded-lg text-left transition-all ${activeCategory === cat && !search && viewMode !== 'quiz' ? "bg-blue-50 text-blue-700 font-bold border-l-4 border-blue-600" : "text-slate-600 hover:bg-slate-100"}`}>
                        <span className="text-xs truncate">{cat}</span>
                        <span className="text-[10px] bg-slate-200 text-slate-500 px-1.5 py-0.5 rounded-md">{VOCAB_DATA[cat].length}</span>
                      </button>
                    ))}
                  </div>
                </div>
              </aside>
              <main className="flex-1 overflow-y-auto h-screen p-4 md:p-10 relative">
                <div className="max-w-5xl mx-auto space-y-10">
                  {viewMode === 'quiz' ? <QuizMode /> : (
                    <>
                      <div className="flex flex-col gap-6">
                        <div className="flex flex-col md:flex-row md:items-center justify-between gap-4">
                          <div>
                            <h2 className="text-xl md:text-2xl font-bold text-slate-800">{search ? `Arama: "${search}"` : activeCategory}</h2>
                            <p className="text-slate-400 text-xs mt-1">Bu bölümde {filteredWords.length} terim bulunmaktadır.</p>
                          </div>
                          <div className="flex bg-white p-1 rounded-xl shadow-sm border border-slate-200 w-fit">
                            <button onClick={() => setViewMode('cards')} className={`px-4 py-2 rounded-lg flex items-center gap-2 text-xs font-semibold transition-all ${viewMode === 'cards' ? 'bg-blue-600 text-white shadow-md' : 'text-slate-500 hover:bg-slate-50'}`}><Layers size={14} /> Kartlar</button>
                            <button onClick={() => setViewMode('list')} className={`px-4 py-2 rounded-lg flex items-center gap-2 text-xs font-semibold transition-all ${viewMode === 'list' ? 'bg-blue-600 text-white shadow-md' : 'text-slate-500 hover:bg-slate-50'}`}><Search size={14} /> Liste</button>
                          </div>
                        </div>
                        <div className="relative group max-w-2xl">
                          <Search className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within:text-blue-500 transition-colors" size={18} />
                          <input type="text" placeholder="Kelime ara (Eng/Tr)..." value={search} onChange={(e) => setSearch(e.target.value)} className="w-full bg-white border border-slate-200 py-3.5 pl-11 pr-6 rounded-2xl shadow-sm focus:outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all text-sm" />
                        </div>
                      </div>
                      {viewMode === 'cards' ? (
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6">
                          {filteredWords.length > 0 ? filteredWords.map((item, idx) => <FlashCard key={`${item.en}-${idx}`} item={item} />) : <div className="col-span-full py-24 text-center bg-white rounded-3xl border border-dashed border-slate-200"><BookOpen size={40} className="mx-auto text-slate-100 mb-4" /><p className="text-slate-400 text-sm">Sonuç bulunamadı.</p></div>}
                        </div>
                      ) : (
                        <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden"><div className="overflow-x-auto"><table className="w-full text-left border-collapse min-w-[500px]"><thead className="bg-slate-50 border-b border-slate-200"><tr><th className="px-6 py-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest">İngilizce</th><th className="px-6 py-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest">Türkçe</th></tr></thead><tbody className="divide-y divide-slate-100">{filteredWords.map((item, idx) => <tr key={idx} className="hover:bg-blue-50/40 transition-colors group"><td className="px-6 py-4 font-bold text-slate-700 text-sm">{item.en}</td><td className="px-6 py-4 text-slate-500 text-sm group-hover:text-blue-700">{item.tr}</td></tr>)}</tbody></table></div></div>
                      )}
                    </>
                  )}
                </div>
              </main>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
