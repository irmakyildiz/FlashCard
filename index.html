                  const newData = { ...prev };

                    </div>

                    <div className="flex items-center justify-between border-b pb-2">
                        <h2 className="text-xl font-black text-slate-700">{search ? "Arama Sonuçları" : activeCat}</h2>
                        <span className="text-slate-400 text-sm font-bold">{filteredList.length} Terim (Hafızada Kayıtlı)</span>
                    </div>

                    {/* KARTLAR */}
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
                      {filteredList.map((item, i) => (
                        <FlashCard 
                          key={i} 
                          item={item} 
                          isFlipped={flippedStates[i]} 
                          onClick={() => setFlippedStates(prev => ({...prev, [i]: !prev[i]}))}
                          onDelete={() => handleDeleteWord(item.en, item.tr)}
                        />
                      ))}
                    </div>
                  </div>
                )}

                {/* MOD 2: ÖĞRENME MODU (Flashcard Quiz - Biliyorum/Bilemedim) */}
                {view === 'quiz' && (
                  flashcardDeck.length > 0 ? (
                    <div className="max-w-xl mx-auto space-y-8">
                      <div className="flex justify-between items-center text-slate-400 font-bold">
                        <span><i className="fa-solid fa-layer-group"></i> Kalan Kart: {flashcardDeck.length}</span>
                        <button onClick={() => setView('cards')} className="hover:text-red-500">Çıkış <i className="fa-solid fa-xmark"></i></button>
                      </div>
                      <FlashCard item={flashcardDeck[0]} isFlipped={isFlashcardFlipped} onClick={() => setIsFlashcardFlipped(!isFlashcardFlipped)} isLarge={true} />
                      <div className="grid grid-cols-2 gap-4">
                        <button onClick={() => handleFlashcardNext(false)} className="bg-white border-2 border-red-100 p-6 rounded-3xl text-red-500 font-black hover:bg-red-50 transition-all">BİLEMEDİM</button>
                        <button onClick={() => handleFlashcardNext(true)} className="bg-white border-2 border-green-100 p-6 rounded-3xl text-green-500 font-black hover:bg-green-50 transition-all">BİLİYORUM</button>
                      </div>
                    </div>
                  ) : (
                    <div className="text-center py-20">
                        <div className="w-24 h-24 bg-indigo-100 text-indigo-500 rounded-full flex items-center justify-center text-4xl mx-auto mb-6">
                            <i className="fa-solid fa-crown"></i>
                        </div>
                        <h2 className="text-4xl font-black mb-4 text-slate-800">Şampiyon!</h2>
                        <p className="text-slate-500 mb-6">Eklediğin yeni kelimeler dahil tüm desteyi bitirdin.</p>
                        <button onClick={() => setView('cards')} className="bg-blue-600 text-white px-8 py-4 rounded-2xl font-bold shadow-lg hover:bg-blue-700 transition-colors">Kartlara Geri Dön</button>
                    </div>
                  )
                )}

                {/* MOD 3: KONU ÖĞRENME (PDF ÖZETLERİ) */}
                {view === 'learn' && (
                    <div className="max-w-4xl mx-auto space-y-8">
                        <h2 className="text-3xl font-black text-slate-800 border-b-4 border-amber-500 inline-block pb-2">Ders Notları Özetleri</h2>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            {LECTURE_DATA.map((lec, i) => (
                                <div key={i} className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 hover:shadow-md transition-shadow">
                                    <div className="w-12 h-12 bg-amber-100 text-amber-600 rounded-2xl flex items-center justify-center mb-4 text-xl">
                                        <i className="fa-solid fa-bookmark"></i>
                                    </div>
                                    <h3 className="text-xl font-bold text-slate-800 mb-3">{lec.title}</h3>
                                    <p className="text-slate-600 leading-relaxed text-sm">{lec.content}</p>
                                </div>
                            ))}
                        </div>
                    </div>
                )}

                {/* MOD 4: TEST (QUIZ) ve SORU EKLEME */}
                {view === 'test' && (
                    <div className="max-w-3xl mx-auto space-y-8">
                        
                        {/* Test Çözme Alanı */}
                        <div className="bg-white p-8 rounded-3xl shadow-md border border-slate-100">
                            {!showTestResult ? (
                                <div>
                                    <div className="flex justify-between items-center mb-6 text-sm font-bold text-slate-400">
                                        <span>Soru {currentQIndex + 1} / {customQuestions.length}</span>
                                        <span className="text-green-500">Skor: {score}</span>
                                    </div>
                                    <h3 className="text-2xl font-bold text-slate-800 mb-8">{customQuestions[currentQIndex].question}</h3>
                                    <div className="space-y-3">
                                        {customQuestions[currentQIndex].options.map((opt, i) => {
                                            let btnClass = "bg-slate-50 border-2 border-slate-100 hover:border-blue-300 hover:bg-blue-50 text-slate-700";
                                            if (selectedOption) {
                                                if (opt === customQuestions[currentQIndex].answer) btnClass = "bg-green-100 border-2 border-green-500 text-green-800 font-bold";
                                                else if (opt === selectedOption) btnClass = "bg-red-100 border-2 border-red-500 text-red-800 font-bold";
                                                else btnClass = "bg-slate-50 border-2 border-slate-100 opacity-50";
                                            }

                                            return (
                                                <button 
                                                    key={i} 
                                                    onClick={() => handleAnswerClick(opt)}
                                                    className={`w-full text-left p-4 rounded-2xl transition-all ${btnClass}`}
                                                    disabled={selectedOption !== null}
                                                >
                                                    {String.fromCharCode(65 + i)}) {opt}
                                                </button>
                                            );
                                        })}
                                    </div>
                                </div>
                            ) : (
                                <div className="text-center py-10">
                                    <div className="w-24 h-24 bg-green-100 text-green-500 rounded-full flex items-center justify-center text-4xl mx-auto mb-6">
                                        <i className="fa-solid fa-trophy"></i>
                                    </div>
                                    <h2 className="text-3xl font-black text-slate-800 mb-2">Test Bitti!</h2>
                                    <p className="text-xl text-slate-600 mb-8">Doğru Sayısı: <span className="font-bold text-green-600">{score}</span> / {customQuestions.length}</p>
                                    <button onClick={resetTest} className="bg-blue-600 text-white px-8 py-4 rounded-2xl font-bold shadow-lg hover:bg-blue-700 transition-colors">
                                        Yeniden Çöz
                                    </button>
                                </div>
                            )}
                        </div>

                        {/* Manuel Soru Ekleme Formu */}
                        <div className="bg-slate-100 p-8 rounded-3xl border border-slate-200">
                            <h3 className="text-xl font-bold text-slate-800 mb-6 flex items-center gap-2">
                                <i className="fa-solid fa-circle-plus text-blue-600"></i> Kendi Sorunu Ekle (Hafızaya Kaydolur)
                            </h3>
                            <form onSubmit={handleAddQuestion} className="space-y-4">
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 uppercase mb-2">Soru Metni</label>
                                    <textarea required value={newQText} onChange={(e) => setNewQText(e.target.value)} className="w-full p-4 rounded-xl border-none shadow-sm focus:ring-2 focus:ring-blue-500 outline-none resize-none h-24" placeholder="Soru yazınız..."></textarea>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    {newQOptions.map((opt, i) => (
                                        <div key={i}>
                                            <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Şık {String.fromCharCode(65 + i)}</label>
                                            <div className="flex items-center gap-2">
                                                <input type="radio" name="correctAnswer" checked={newQAnswerIndex === i} onChange={() => setNewQAnswerIndex(i)} className="w-5 h-5 text-blue-600 cursor-pointer" />
                                                <input required type="text" value={opt} onChange={(e) => handleOptionChange(i, e.target.value)} className="w-full p-3 rounded-xl border-none shadow-sm focus:ring-2 focus:ring-blue-500 outline-none" placeholder={`Şık ${String.fromCharCode(65 + i)}...`} />
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <p className="text-xs text-slate-500 italic">Doğru cevabı belirtmek için şıkkın yanındaki yuvarlağı seçin.</p>
                                <button type="submit" className="w-full bg-slate-900 text-white p-4 rounded-xl font-bold hover:bg-black transition-colors">
                                    Soruyu Teste Ekle
                                </button>
                            </form>
                        </div>

                    </div>
                )}

              </main>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
